name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select iPad simulator
        run: |
          SIM_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime or 'iPadOS' in runtime:
                  for d in devices:
                      if 'iPad' in d['name'] and d.get('isAvailable', False):
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "Found simulator UDID: $SIM_UDID"
          echo "SIM_UDID=$SIM_UDID" >> $GITHUB_ENV

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MiniMissions.xcodeproj \
            -scheme MiniMissions \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -only-testing:MiniMissionsTests \
            -resultBundlePath TestResults/unit.xcresult

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MiniMissions.xcodeproj \
            -scheme MiniMissions \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -only-testing:MiniMissionsUITests \
            -resultBundlePath TestResults/ui.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
