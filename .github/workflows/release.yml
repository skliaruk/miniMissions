name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select iPad simulator
        run: |
          SIM=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime or 'iPadOS' in runtime:
                  for d in devices:
                      if 'iPad' in d['name'] and d.get('isAvailable', False):
                          print(d['name'])
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "Found simulator: $SIM"
          echo "SIMULATOR=$SIM" >> $GITHUB_ENV

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MiniMissions.xcodeproj \
            -scheme MiniMissions \
            -destination "platform=iOS Simulator,name=$SIMULATOR" \
            -only-testing:MiniMissionsTests \
            -resultBundlePath TestResults/unit.xcresult

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MiniMissions.xcodeproj \
            -scheme MiniMissions \
            -destination "platform=iOS Simulator,name=$SIMULATOR" \
            -only-testing:MiniMissionsUITests \
            -resultBundlePath TestResults/ui.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  release:
    name: Archive & Upload to TestFlight
    needs: test
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8
          chmod 600 ~/.private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project MiniMissions.xcodeproj \
            -scheme MiniMissions \
            -destination 'generic/platform=iOS' \
            -archivePath build/MiniMissions.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.API_ISSUER_ID }}

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/MiniMissions.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.API_ISSUER_ID }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f build/ipa/MiniMissions.ipa \
            --type ios \
            --apiKey ${{ secrets.API_KEY_ID }} \
            --apiIssuer ${{ secrets.API_ISSUER_ID }}

      - name: Clean up API key
        if: always()
        run: rm -f ~/.private_keys/AuthKey_*.p8

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/ipa/
